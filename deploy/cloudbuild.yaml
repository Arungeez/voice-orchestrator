steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/voice-orchestrator'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/voice-orchestrator'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'voice-orchestrator'
      - '--image'
      - 'gcr.io/$PROJECT_ID/voice-orchestrator'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '1Gi'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
      - '--set-secrets'
      - 'MONGODB_URI=MONGODB_URI:latest,VAPI_API_KEY=VAPI_API_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,VAPI_PHONE_NUMBER_ID=VAPI_PHONE_NUMBER_ID:latest'

images:
  - 'gcr.io/$PROJECT_ID/voice-orchestrator'

options:
  logging: CLOUD_LOGGING_ONLY
